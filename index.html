<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofrito.org - Books & Posters</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Sofrito.org</h1>
            <p class="tagline">Books & Posters Collection</p>
        </div>
    </header>

    <main class="container">
        <section class="intro">
            <h2>Welcome to Our Collection</h2>
            <p>Discover our curated selection of books and art posters</p>
        </section>

        <section class="filters">
            <button class="filter-btn active" data-filter="all">All Items</button>
            <button class="filter-btn" data-filter="books">Books</button>
            <button class="filter-btn" data-filter="posters">Posters</button>
        </section>

        <section class="products" id="products-grid">
            <!-- Products will be dynamically inserted here -->
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Sofrito.org. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
